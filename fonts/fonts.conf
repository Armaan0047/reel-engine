<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <!--
    Minimal fontconfig for Railway/Docker headless Linux.
    Committed to repo so it exists BEFORE any process runs.
  -->

  <!-- Project bundled fonts -->
  <dir prefix="relative">.</dir>

  <!-- System font locations (if available) -->
  <dir>/usr/share/fonts</dir>
  <dir>/usr/local/share/fonts</dir>

  <!-- Writable cache in /tmp (Railway allows this) -->
  <cachedir>/tmp/fontconfig-cache</cachedir>

  <!-- Map Windows font names to Linux equivalents -->
  <match target="pattern">
    <test qual="any" name="family"><string>Arial Black</string></test>
    <edit name="family" mode="assign" binding="same"><string>DejaVu Sans</string></edit>
  </match>
  <match target="pattern">
    <test qual="any" name="family"><string>Arial</string></test>
    <edit name="family" mode="assign" binding="same"><string>DejaVu Sans</string></edit>
  </match>
  <match target="pattern">
    <test qual="any" name="family"><string>Helvetica</string></test>
    <edit name="family" mode="assign" binding="same"><string>DejaVu Sans</string></edit>
  </match>

  <!-- Default sans-serif fallback -->
  <alias>
    <family>sans-serif</family>
    <prefer><family>DejaVu Sans</family></prefer>
  </alias>
</fontconfig>
