# Nixpacks build configuration for Railway
# Installs system-level font packages required by FFmpeg's libass subtitle filter

[phases.setup]
aptPkgs = ["ffmpeg", "fontconfig", "fonts-dejavu-core", "fonts-dejavu-extra", "fonts-liberation"]

[phases.install]
cmds = ["pip install -r requirements.txt", "fc-cache -fv 2>/dev/null || true"]
